spring:
  application:
    name: hik-isup

server:
  port: 16233
  address: 0.0.0.0

hik:
  bridge:
    # Internal API token required by X-Flow-Bridge-Token.
    token: ${FLOW_BRIDGE_TOKEN:}

  provisioning:
    # Face upload protocol variant. One of:
    #   face-data-record-faceimage -> POST /ISAPI/Intelligent/FDLib/FaceDataRecord?format=json, image part name "FaceImage", multipart JSON = {"FaceDataRecord":{"employeeNo":..,"faceLibType":"blackFace"}} (mirrors Laravel)
    #   face-data-record-img       -> same path, image part name "img"
    #   fd-setup-img               -> PUT  /ISAPI/Intelligent/FDLib/FDSetUp?format=json, image part name "img", JSON adds employeeNo
    #   face-url                   -> POST /ISAPI/Intelligent/FDLib/FaceDataRecord?format=json, JSON-only FLAT body with faceURL (capital) at top level: {"faceLibType":"blackFD","FDID":"1","FPID":"<e>","faceURL":"http://.."} - this is the per-device-capability discovery default (DS-K1T321MFWX: faceURLLen=1024)
    #   face-url-flat-faceurl-lower-> same as face-url but the URL key is lowercase "faceUrl"
    #   face-url-wrapped-faceURL   -> same as face-url but the descriptor is nested under "FaceDataRecord"
    # Defaults to the most widely supported multipart variant. If the device
    # rejects multipart with statusCode=5 badJsonFormat, switch to face-url.
    face-upload-mode: ${FLOW_HIK_FACE_UPLOAD_MODE:face-data-record-faceimage}
    # FACE_URL payload shape, only used when face-upload-mode is one of the
    # face-url* modes. One of:
    #   flat-faceurl-upper    -> {"faceLibType":"blackFD","FDID":"1","FPID":"<e>","faceURL":".."}   (default, matches capabilities)
    #   flat-faceurl-lower    -> same but key "faceUrl"
    #   wrapped-faceurl-upper -> {"FaceDataRecord":{"faceLibType":"blackFD","FDID":"1","FPID":"<e>","faceURL":".."}}
    #   wrapped-faceurl-lower -> same but key "faceUrl"
    face-url-shape: ${FLOW_HIK_FACE_URL_SHAPE:flat-faceurl-upper}
    # Top-level faceLibType value - discovered via GET /ISAPI/Intelligent/FDLib.
    face-lib-type: ${FLOW_HIK_FACE_LIB_TYPE:blackFD}
    # FDLib id to enroll into - FDID "1" ships with the typical blackFD library.
    fdid: ${FLOW_HIK_FACE_FDID:1}

  face-url:
    # Optional explicit base URL for the temporary face-image endpoint. When
    # blank, the bridge derives it from hik.stream.http (public IP/port). The
    # Hikvision device must be able to reach this URL over HTTP.
    base-url: ${FLOW_HIK_FACE_URL_BASE:}
    # Path prefix under which temporary one-shot face tokens are served.
    path-prefix: ${FLOW_HIK_FACE_URL_PATH_PREFIX:/internal/face/}

  features:
    cms:
      enabled: ${FLOW_HIK_CMS_ENABLED:true}
    provisioning:
      enabled: ${FLOW_HIK_PROVISIONING_ENABLED:false}
    raw-isapi:
      enabled: ${FLOW_HIK_RAW_ISAPI_ENABLED:false}
    alarm:
      enabled: ${FLOW_HIK_ALARM_ENABLED:false}
    stream:
      enabled: ${FLOW_HIK_STREAM_ENABLED:false}
    storage:
      enabled: ${FLOW_HIK_STORAGE_ENABLED:false}
    voice:
      enabled: ${FLOW_HIK_VOICE_ENABLED:false}
    playback:
      enabled: ${FLOW_HIK_PLAYBACK_ENABLED:false}
    channel-sync:
      enabled: ${FLOW_HIK_CHANNEL_SYNC_ENABLED:false}
    # Attendance ACS event search (POST /api/devices/{deviceId}/events/search).
    # Lets Laravel poll /ISAPI/AccessControl/AcsEvent through the bridge for
    # devices behind NAT/EHome. Keep it disabled until Laravel is wired in.
    attendance-events:
      enabled: ${FLOW_HIK_ATTENDANCE_EVENTS_ENABLED:false}

  platform:
    pushAddress: ${FLOW_APP_PUSH_ADDRESS:http://127.0.0.1:9080/iot/event/HK/callback}
    ttsServer: ${FLOW_TTS_SERVER:http://127.0.0.1:3000/api/v1/tts/generateJson}

  stream:
    isSSL: false
    domain: __defaultVhost__
    http:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_STREAM_HTTP_PORT:7788}

  isup:
    cmsServer:
      ip: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      port: ${FLOW_HIK_CMS_PORT:7660}

    dasServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_DAS_PORT:7660}

    smsServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_SMS_PORT:7665}
      listenIp: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      listenPort: ${FLOW_HIK_SMS_LISTEN_PORT:7665}

    smsBackServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_SMS_BACK_PORT:8000}
      listenIp: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      listenPort: ${FLOW_HIK_SMS_BACK_LISTEN_PORT:8000}

    voiceSmsServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_VOICE_SMS_PORT:7500}
      listenIp: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      listenPort: ${FLOW_HIK_VOICE_SMS_LISTEN_PORT:7500}

    alarmServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      tcpPort: ${FLOW_HIK_ALARM_TCP_PORT:7663}
      udpPort: ${FLOW_HIK_ALARM_UDP_PORT:7662}
      type: ${FLOW_HIK_ALARM_TYPE:2}
      listenIp: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      listenTcpPort: ${FLOW_HIK_ALARM_LISTEN_TCP_PORT:7663}
      listenUdpPort: ${FLOW_HIK_ALARM_LISTEN_UDP_PORT:7662}

    picServer:
      ip: ${FLOW_HIK_PUBLIC_IP:104.248.187.45}
      port: ${FLOW_HIK_PIC_PORT:6120}
      type: ${FLOW_HIK_PIC_TYPE:2}
      listenIp: ${FLOW_HIK_LISTEN_IP:104.248.187.45}
      listenPort: ${FLOW_HIK_PIC_LISTEN_PORT:6120}

    isupKey: ${FLOW_HIK_ISUP_KEY:hik12345}
    eventInfoPrintType: ${FLOW_HIK_EVENT_PRINT_TYPE:console}
